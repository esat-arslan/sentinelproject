services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
        - pulse-network
  db:
    image: postgres:18.3
    container_name: pulse-db
    ports:
      - "5432:5432"
    networks:
        - pulse-network
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    volumes:
      - db_data:/var/lib/postgressql
  backend:
    build: ./backend
    container_name: pulse-api
    ports:
      - "8000:8000"
    networks:
      - pulse-network
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    depends_on:
      - db
      - redis
  worker:
    build: ./worker
    container_name: pulse-network
    environment:
      - REDIS_HOST=${REDIS_HOST} 
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    networks:
        - pulse-network
    depends_on:
      - db
      - redis
  frontend:
    build: ./frontend
    container_name: pulse-ui
    ports:
      - "3000:80"
    depends_on:
     - backend
    networks:
        - pulse-network
networks:
  pulse-network:
    driver: bridge
volumes:
  db_data:
        
